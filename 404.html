<h1>资源旗首页：<a href="http://resourceflag.com/" target="_blank" title="">resourceflag.com</a></h1>

<h2><div id="countdown"></div></h2>

<script language="javascript" type="text/javascript">
    var time = 5
    var divLabel = document.getElementById("countdown")
    var label = "秒钟后系统将帮您自动跳转到 资源旗 网站。"
    divLabel.innerHTML = time.toString() + label
    function updateTime(){
        time = time-1
        if(time>=0){ divLabel.innerHTML = time.toString() + label }
        else{ divLabel.innerHTML = "正在跳转，请稍后。。。" }
    }
    setInterval("updateTime()",1000);
    setTimeout("javascript:location.href='http://resourceflag.com/'", time*1000);
</script>

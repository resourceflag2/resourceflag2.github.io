<body>

对不起，您所访问的页面不存在或者已删除。

<h1>看片导航首页：<a href="http://kptop.top/" target="_blank" title="">kptop.top</a></h1>

<h2><div id="countdown"></div></h2>

<script language="javascript" type="text/javascript">
    var time = 5
    var divLabel = document.getElementById("countdown")
    var label = "秒钟后系统将帮您自动跳转到看片导航网站。"
    divLabel.innerHTML = time.toString() + label
    function updateTime(){
        time = time-1
        if(time>=0){ divLabel.innerHTML = time.toString() + label }
        else{ divLabel.innerHTML = "正在跳转，请稍后。。。" }
    }
    setInterval("updateTime()",1000);
    setTimeout("javascript:location.href='http://kptop.top/'", time*1000);
</script>

</body>
